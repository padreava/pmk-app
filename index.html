<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПМК</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
body{font-family:Arial;background:#eef2f3;margin:0;text-align:center}
h1{margin:15px;font-size:22px}
.wheel{height:220px;width:90px;overflow-y:scroll;background:white;margin:10px auto;border-radius:10px}
.value{height:40px;display:flex;align-items:center;justify-content:center}
.value.selected{font-size:24px;color:#2e7d32;font-weight:bold}
.result{background:white;margin:20px auto;padding:15px;border-radius:10px;max-width:300px}
</style>

</head>
<body>

<h1>ПОДБОР ПМК</h1>

<div id="w1" class="wheel"></div>
<div id="w2" class="wheel"></div>

<div class="result">
<div>Сумма: <b id="sum">0</b></div>
<div>Размер: <b id="size">-</b></div>
</div>

<script>

function fillWheel(el,start,end){
for(let i=start;i<=end;i+=0.5){
let d=document.createElement('div')
d.className='value'
d.innerText=i.toFixed(1)
d.dataset.val=i
el.appendChild(d)
}
}

fillWheel(w1,30,90)
fillWheel(w2,30,90)

function getValue(wheel){
let rect = wheel.getBoundingClientRect();
let center = rect.top + rect.height/2;
let items=[...wheel.children];

let closest=null,dist=9999;

items.forEach(i=>{
let r=i.getBoundingClientRect();
let c=r.top+r.height/2;
let d=Math.abs(c-center);
if(d<dist){dist=d;closest=i;}
i.classList.remove('selected');
});

if(closest){
closest.classList.add('selected');
return parseFloat(closest.dataset.val);
}
return 0;
}

function calc(){
let a=getValue(w1)
let b=getValue(w2)
let sum=a+b

let size='-'

if(sum<=118.5)size=1
else if(sum<=123.5)size=2
else size=3

document.getElementById('sum').innerText=sum.toFixed(1)
document.getElementById('size').innerText=size
}

[w1,w2].forEach(w=>w.addEventListener('scroll',()=>setTimeout(calc,50)))

setTimeout(calc,200)

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
